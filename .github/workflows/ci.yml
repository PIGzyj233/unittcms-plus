name: UnitTCMS CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  unittcms-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # root
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    - name: Install agent MCP dependencies
      working-directory: ./agent-mcp
      run: npm ci
    - name: Format check
      run: npm run format:check
    - name: ESLint check
      run: npm run lint
    - name: Unit tests
      run: npm run test

    # frontend
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
